<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Гаражи Плотина</title>
    <style>
        body { font-family: Arial; padding: 20px; background: #1e3c2c; }
        .container { max-width: 500px; margin: 0 auto; background: white; padding: 20px; border-radius: 20px; }
        input, button, textarea { width: 100%; padding: 10px; margin: 10px 0; }
        button { background: #2a6b3c; color: white; border: none; cursor: pointer; }
        .photo-upload { border: 2px dashed #ccc; padding: 20px; text-align: center; cursor: pointer; margin: 10px 0; }
        .photo-preview img { max-width: 100%; max-height: 150px; margin-top: 10px; }
        .message { padding: 10px; margin: 10px 0; border-radius: 10px; display: none; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
<div class="container">
    <h1>🏢 Гаражи Плотина</h1>
    <p>Передача показаний электроэнергии</p>
    
    <div id="message" class="message"></div>
    
    <input type="text" id="garageNumber" placeholder="Номер гаража">
    <input type="number" id="reading" placeholder="Показания (кВт·ч)">
    
    <div class="photo-upload" id="photoUploadArea">
        📷 Нажмите для загрузки фото
        <input type="file" id="photoInput" accept="image/*" capture="environment" style="display:none">
    </div>
    <div id="photoPreview" class="photo-preview"></div>
    
    <textarea id="notes" placeholder="Примечание (необязательно)"></textarea>
    
    <button id="submitBtn">📤 Отправить показания</button>
    
    <div id="history"></div>
</div>

<script>
    const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyE8hY8DGVwvhO5P3GqvWuIr6u1hs7mlhTgYXGESUZHH0ktCSe7TSrRZXJ6KXLgWiOr8A/exec';
    const STORAGE_KEY = 'garageReadings_Plotina';
    let readings = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
    let currentPhoto = null;
    
    function showMessage(text, type) {
        const msg = document.getElementById('message');
        msg.textContent = text;
        msg.className = `message ${type}`;
        msg.style.display = 'block';
        setTimeout(() => msg.style.display = 'none', 3000);
    }
    
    document.getElementById('photoUploadArea').onclick = () => {
        document.getElementById('photoInput').click();
    };
    
    document.getElementById('photoInput').onchange = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        if (file.size > 5 * 1024 * 1024) {
            showMessage('Файл слишком большой (макс 5 МБ)', 'error');
            return;
        }
        const reader = new FileReader();
        reader.onload = (ev) => {
            currentPhoto = ev.target.result;
            document.getElementById('photoPreview').innerHTML = `<img src="${currentPhoto}" alt="Фото">`;
        };
        reader.readAsDataURL(file);
    };
    
    async function sendData(garageNumber, reading, notes, photo) {
        try {
            await fetch(GOOGLE_SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ garageNumber, reading, notes, photo, timestamp: new Date().toISOString() })
            });
            return true;
        } catch (e) {
            console.error(e);
            return false;
        }
    }
    
    function displayHistory() {
        const historyDiv = document.getElementById('history');
        if (readings.length === 0) {
            historyDiv.innerHTML = '<p>Пока нет показаний</p>';
            return;
        }
        let html = '<h3>История:</h3>';
        [...readings].reverse().forEach(r => {
            html += `<div><b>Гараж ${r.garageNumber}</b>: ${r.reading} кВт·ч (${new Date(r.date).toLocaleString()})</div>`;
        });
        historyDiv.innerHTML = html;
    }
    
    document.getElementById('submitBtn').onclick = async () => {
        const garageNumber = document.getElementById('garageNumber').value.trim();
        const reading = document.getElementById('reading').value;
        const notes = document.getElementById('notes').value.trim();
        
        if (!garageNumber) { showMessage('Введите номер гаража', 'error'); return; }
        if (!reading) { showMessage('Введите показания', 'error'); return; }
        const readingValue = parseFloat(reading);
        if (isNaN(readingValue)) { showMessage('Введите число', 'error'); return; }
        
        const newReading = { garageNumber, reading: readingValue, notes, date: new Date().toISOString() };
        readings.push(newReading);
        localStorage.setItem(STORAGE_KEY, JSON.stringify(readings));
        
        const saved = await sendData(garageNumber, readingValue, notes, currentPhoto);
        
        if (saved) showMessage('✅ Отправлено!', 'success');
        else showMessage('⚠️ Сохранено на устройстве', 'info');
        
        document.getElementById('garageNumber').value = '';
        document.getElementById('reading').value = '';
        document.getElementById('notes').value = '';
        document.getElementById('photoPreview').innerHTML = '';
        currentPhoto = null;
        displayHistory();
    };
    
    displayHistory();
    console.log('Сайт работает');
</script>
</body>
</html>
