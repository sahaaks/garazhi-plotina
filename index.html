<script>
document.addEventListener('DOMContentLoaded', function() {
    const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyE8hY8DGVwvhO5P3GqvWuIr6u1hs7mlhTgYXGESUZHH0ktCSe7TSrRZXJ6KXLgWiOr8A/exec';
    const STORAGE_KEY = 'garageReadings_Plotina';
    let readings = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
    
    const form = document.getElementById('readingForm');
    const garageNumberInput = document.getElementById('garageNumber');
    const readingInput = document.getElementById('reading');
    const photoInput = document.getElementById('photoInput');
    const photoPreview = document.getElementById('photoPreview');
    const photoUploadArea = document.getElementById('photoUploadArea');
    const notesInput = document.getElementById('notes');
    const messageDiv = document.getElementById('message');
    const readingsListDiv = document.getElementById('readingsList');
    const clearHistoryBtn = document.getElementById('clearHistory');
    const submitBtn = document.getElementById('submitBtn');
    
    let currentPhoto = null;
    
    function isOnline() { return navigator.onLine; }
    
    function showOnlineStatus() {
        const statusDiv = document.createElement('div');
        statusDiv.id = 'onlineStatus';
        statusDiv.style.cssText = 'text-align: center; margin-bottom: 15px;';
        statusDiv.innerHTML = isOnline() 
            ? '<span class="online-status status-online">🟢 Онлайн - данные будут сохранены в облаке</span>'
            : '<span class="online-status status-offline">🔴 Офлайн - данные сохранятся на устройстве</span>';
        const existingStatus = document.getElementById('onlineStatus');
        if (existingStatus) existingStatus.replaceWith(statusDiv);
        else form.before(statusDiv);
    }
    
    window.addEventListener('online', () => { showOnlineStatus(); showMessage('Интернет появился!', 'success'); });
    window.addEventListener('offline', () => { showOnlineStatus(); showMessage('Интернет пропал. Данные сохранятся на устройстве', 'info'); });
    
    if (photoUploadArea) {
        photoUploadArea.addEventListener('click', (e) => { if (e.target !== photoInput) photoInput.click(); });
    }
    
    if (photoInput) {
        photoInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                if (file.size > 5 * 1024 * 1024) {
                    showMessage('Файл слишком большой. Максимальный размер 5 МБ', 'error');
                    photoInput.value = '';
                    return;
                }
                const reader = new FileReader();
                reader.onload = function(e) {
                    currentPhoto = e.target.result;
                    photoPreview.innerHTML = `
                        <div style="position: relative; display: inline-block;">
                            <img src="${currentPhoto}" alt="Фото счетчика" onclick="openModal('${currentPhoto}')">
                            <button type="button" onclick="removePhoto()" style="position: absolute; top: -10px; right: -10px; background: red; color: white; border: none; border-radius: 50%; width: 30px; height: 30px; cursor: pointer; font-size: 18px;">×</button>
                        </div>
                    `;
                };
                reader.readAsDataURL(file);
            } else { removePhoto(); }
        });
    }
    
    window.removePhoto = function() { currentPhoto = null; photoPreview.innerHTML = ''; photoInput.value = ''; };
    window.openModal = function(src) { document.getElementById('modalImage').src = src; document.getElementById('photoModal').style.display = 'block'; };
    window.closeModal = function() { document.getElementById('photoModal').style.display = 'none'; };
    document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeModal(); });
    
    function showMessage(text, type) {
        messageDiv.textContent = text;
        messageDiv.className = `message ${type}`;
        messageDiv.style.display = 'block';
        setTimeout(() => messageDiv.style.display = 'none', 4000);
    }
    
    async function saveToGoogleSheets(readingData) {
        console.log('📤 Отправка...');
        try {
            await fetch(GOOGLE_SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    garageNumber: readingData.garageNumber,
                    reading: readingData.reading,
                    notes: readingData.notes || '',
                    timestamp: new Date().toISOString()
                })
            });
            console.log('✅ Данные отправлены');
            return true;
        } catch (error) {
            console.error('❌ Ошибка:', error);
            return false;
        }
    }
    
    function displayReadings() {
        if (readings.length === 0) {
            readingsListDiv.innerHTML = '<p style="text-align: center; color: #999;">Пока нет переданных показаний</p>';
            updateStats();
            return;
        }
        let html = '';
        [...readings].reverse().forEach(r => {
            html += `
                <div class="reading-card">
                    <div class="garage">🚗 Гараж №${escapeHtml(r.garageNumber)}</div>
                    <div class="value">⚡ ${r.reading} кВт·ч</div>
                    ${r.notes ? `<div class="notes">💬 ${escapeHtml(r.notes)}</div>` : ''}
                    <div class="date">📅 ${new Date(r.date).toLocaleString('ru-RU')}</div>
                </div>
            `;
        });
        readingsListDiv.innerHTML = html;
        updateStats();
    }
    
    function escapeHtml(text) { const div = document.createElement('div'); div.textContent = text; return div.innerHTML; }
    
    function updateStats() {
        const total = readings.length;
        let statsDiv = document.querySelector('.stats');
        if (!statsDiv) {
            statsDiv = document.createElement('div');
            statsDiv.className = 'stats';
            document.querySelector('.history h3')?.after(statsDiv);
        }
        const lastReading = readings.length > 0 ? readings[readings.length - 1] : null;
        statsDiv.innerHTML = `📊 Всего передано показаний: ${total}${lastReading ? ` | Последнее: ${new Date(lastReading.date).toLocaleDateString('ru-RU')}` : ''}`;
    }
    
    if (form) {
        form.addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const garageNumber = garageNumberInput.value.trim();
            const reading = readingInput.value;
            const notes = notesInput.value.trim();
            
            if (!garageNumber) {
                showMessage('❌ Укажите номер гаража!', 'error');
                garageNumberInput.focus();
                return;
            }
            
            if (!reading) {
                showMessage('❌ Введите показания счётчика!', 'error');
                readingInput.focus();
                return;
            }
            
            const readingValue = parseFloat(reading);
            if (isNaN(readingValue) || readingValue < 0) {
                showMessage('❌ Введите корректные показания (положительное число)', 'error');
                readingInput.focus();
                return;
            }
            
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="loading-spinner"></span> Отправка...';
            
            const cloudData = {
                garageNumber: garageNumber,
                reading: readingValue,
                notes: notes || null,
                date: new Date().toISOString()
            };
            
            let cloudSaved = false;
            if (isOnline()) {
                cloudSaved = await saveToGoogleSheets(cloudData);
            }
            
            const localData = {
                garageNumber: garageNumber,
                reading: readingValue,
                notes: notes || null,
                date: new Date().toISOString()
            };
            readings.push(localData);
            localStorage.setItem(STORAGE_KEY, JSON.stringify(readings));
            
            if (cloudSaved) {
                showMessage('✅ Показания отправлены!', 'success');
            } else if (isOnline()) {
                showMessage('⚠️ Данные сохранены на устройстве, но не отправлены в облако', 'info');
            } else {
                showMessage('✅ Сохранено на устройстве. При появлении интернета отправятся в облако', 'success');
            }
            
            garageNumberInput.value = '';
            readingInput.value = '';
            notesInput.value = '';
            removePhoto();
            displayReadings();
            
            submitBtn.disabled = false;
            submitBtn.innerHTML = '📤 Отправить показания';
            garageNumberInput.focus();
        });
    }
    
    if (clearHistoryBtn) {
        clearHistoryBtn.addEventListener('click', () => {
            if (confirm('Очистить историю на этом устройстве?')) {
                readings = [];
                localStorage.removeItem(STORAGE_KEY);
                displayReadings();
                showMessage('История очищена', 'success');
            }
        });
    }
    
    displayReadings();
    showOnlineStatus();
    
    if (/Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent)) {
        const hint = document.createElement('div');
        hint.style.cssText = 'background:#e8f5e9;padding:10px;border-radius:12px;font-size:12px;margin-top:10px;color:#2a6b3c;text-align:center;';
        hint.innerHTML = '📱 Для фото нажмите на область загрузки, затем "Сделать фото"';
        document.querySelector('.photo-upload')?.after(hint);
    }
    
    console.log('Сайт "Гаражи Плотина" загружен');
});
</script>
